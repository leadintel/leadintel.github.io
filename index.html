function upsertMeta(selector, attrs, content){let el=document.head.querySelector(selector);if(!el){el=document.createElement('meta');Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));document.head.appendChild(el)}el.setAttribute('content',content)}
function upsertLink(selector, attrs){let el=document.head.querySelector(selector);if(!el){el=document.createElement('link');document.head.appendChild(el)}Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v))}
function setMeta(){

  document.querySelector('meta[name="description"]').setAttribute('content',CONFIG.meta.description);
  upsertMeta('meta[name="robots"]',{name:'robots'},CONFIG.seo.robots);
  upsertMeta('meta[name="theme-color"]',{name:'theme-color'},CONFIG.seo.themeColor);
  upsertLink('link[rel="canonical"]',{rel:'canonical',href:CONFIG.meta.canonical});
  upsertMeta('meta[property="og:type"]',{property:'og:type'},'website');

function initCounters(){
  const counters=document.querySelectorAll('.counter');
  if(!counters.length) return;
  const animate=el=>{
    const target=Number(el.dataset.target||0);
    const suffix=el.dataset.suffix||'';
    const duration=1400;
    const start=performance.now();
    const step=now=>{
      const progress=Math.min((now-start)/duration,1);
      const eased=1-Math.pow(1-progress,3);
      const value=Math.round(target*eased);
      el.textContent=value.toLocaleString()+suffix;
      if(progress<1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  };
  const io=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        animate(entry.target);
        io.unobserve(entry.target);
      }
    });
  },{threshold:.35});
  counters.forEach(counter=>io.observe(counter));
}

async function downloadReport(){
  const fileName=(CONFIG.downloads&&CONFIG.downloads.samplePdfFileName)||'leadintel-sample-report.pdf';
  if(CONFIG.downloads&&CONFIG.downloads.samplePdfUrl){const link=document.createElement('a');link.href=CONFIG.downloads.samplePdfUrl;link.download=fileName;link.target='_blank';link.rel='noopener';link.click();return;}
  await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js','jspdf');
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const pageWidth=doc.internal.pageSize.getWidth();
  const pageHeight=doc.internal.pageSize.getHeight();
  const margin=42;
  let y=margin;
  const ensureSpace=(needed=24)=>{if(y+needed>pageHeight-margin){doc.addPage();y=margin;}};
  doc.setFillColor(5,8,22);
  doc.rect(0,0,pageWidth,110,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(24);
  doc.text(CONFIG.sampleReport.title,margin,54);
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');
  const intro=doc.splitTextToSize(CONFIG.sampleReport.summary,pageWidth-(margin*2));
  doc.text(intro,margin,78);
  y=128;
  CONFIG.sampleReport.sections.forEach(section=>{
    ensureSpace(48);
    doc.setTextColor(20,33,61);
    doc.setFont('helvetica','bold');
    doc.setFontSize(16);
    doc.text(section[0],margin,y);
    y+=22;
    doc.setFont('helvetica','normal');
    doc.setFontSize(11.5);
    section[1].forEach(item=>{
      const lines=doc.splitTextToSize('• '+item,pageWidth-(margin*2)-8);
      ensureSpace((lines.length*16)+8);
      doc.text(lines,margin+8,y);
      y+=(lines.length*16)+8;
    });
    y+=10;
  });
  doc.save(fileName);
}
async function submitForm(e){
  e.preventDefault();
  const form=e.target;
  const status=document.getElementById('formStatus');
  const submitBtn=form.querySelector('button[type="submit"]');
  const data=Object.fromEntries(new FormData(form).entries());
  if(data.companyWebsite){status.textContent='Submission blocked.';return;}
  const payload={...data,brand:CONFIG.brand.name,pageUrl:location.href,submittedAt:new Date().toISOString(),source:'landing-page',utm:getUtmParams()};
  const jobs=[];
  status.textContent='Sending request...';
  if(submitBtn){submitBtn.disabled=true;submitBtn.style.opacity='.72'}
  if(CONFIG.integrations.googleAppsScript.enabled&&CONFIG.integrations.googleAppsScript.url){jobs.push(postJson(CONFIG.integrations.googleAppsScript.url,payload,'Google Apps Script'))}
  if(CONFIG.integrations.googleSheets.enabled&&CONFIG.integrations.googleSheets.webAppUrl){jobs.push(postJson(CONFIG.integrations.googleSheets.webAppUrl,{...payload,sheetName:CONFIG.integrations.googleSheets.sheetName||'Lead Requests'},'Google Sheets'))}
  if(CONFIG.integrations.telegram.enabled&&CONFIG.integrations.telegram.botToken&&CONFIG.integrations.telegram.chatId){jobs.push(sendTelegram(payload))}
  if(CONFIG.integrations.emailjs.enabled&&CONFIG.integrations.emailjs.publicKey&&CONFIG.integrations.emailjs.serviceId&&CONFIG.integrations.emailjs.templateId){jobs.push(sendEmail(payload))}
  if(!jobs.length){status.textContent='No form integration is enabled in CONFIG yet.';if(submitBtn){submitBtn.disabled=false;submitBtn.style.opacity=''}return;}
  const results=await Promise.allSettled(jobs);
  const ok=results.some(r=>r.status==='fulfilled');
  status.textContent=ok?'Thanks — your request has been submitted.':'Submission failed. Please try again or contact us directly.';
  if(ok) form.reset();
  if(submitBtn){submitBtn.disabled=false;submitBtn.style.opacity=''}
}

function initTiltCards(){if(!CONFIG.ui.enableTiltCards||prefersReducedMotion||window.matchMedia('(pointer:coarse)').matches)return; document.querySelectorAll('.stat,.card,.price,.faq,.timeline-item,.industry,.logo-chip,.audit-chip,.testimonial,.metric-card,.portfolio-card,.hero-person-card,.founder-panel').forEach(card=>{card.classList.add('tilt-card'); card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect(); const px=(e.clientX-r.left)/r.width; const py=(e.clientY-r.top)/r.height; const rx=(.5-py)*6; const ry=(px-.5)*8; card.style.transform=`perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-4px)`; card.style.boxShadow='0 28px 70px rgba(0,0,0,.24)'}); ['mouseleave','blur'].forEach(evt=>card.addEventListener(evt,()=>{card.style.transform=''; card.style.boxShadow='' }))})}
function initPremiumHover(){if(!CONFIG.ui.enablePremiumHover)return; document.querySelectorAll('.stat,.card,.price,.faq,.timeline-item,.industry,.logo-chip,.audit-chip,.testimonial,.metric-card,.portfolio-card,.btn').forEach(el=>el.classList.add('hover-premium'))}
function initDownloads(){const csvBtn=document.getElementById('downloadCsvBtn'); if(csvBtn)csvBtn.textContent=(CONFIG.downloads&&CONFIG.downloads.sampleCsvButtonLabel)||csvBtn.textContent; const reportBtn=document.getElementById('downloadReportBtn'); if(reportBtn)reportBtn.textContent=(CONFIG.downloads&&CONFIG.downloads.samplePdfButtonLabel)||reportBtn.textContent; if(csvBtn&&!document.getElementById('downloadPdfBtn')){const btn=csvBtn.cloneNode(true); btn.id='downloadPdfBtn'; btn.textContent=(CONFIG.downloads&&CONFIG.downloads.samplePdfButtonLabel)||'Download Sample PDF'; csvBtn.insertAdjacentElement('afterend',btn); btn.addEventListener('click',downloadReport)}}
function initReport(){const btn=document.getElementById('downloadReportBtn'); if(btn)btn.addEventListener('click',downloadReport)}
window.addEventListener('load', function(){
  setMeta(); render(); ensureUiChrome(); initTheme(); initTable(); initCounters(); initFaq(); initTyping(); initForm(); initMotion(); initLoader(); initGlow(); initDownloads(); initScrollProgress(); initBackToTop(); initPremiumHover(); initTiltCards(); initInteractiveMedia(); initParticles(); initCustomCursor(); initReport();
});
</script>
